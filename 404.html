<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>N.S. Elizabeth</title>
  <script>
    // Only redirect if not already a ?p= URL (prevents encoding loops)
    var search = window.location.search;
    if (!search.startsWith('?p=')) {
      var path = window.location.pathname;
      var hash = window.location.hash;
      window.location.replace('/?p=' + encodeURIComponent(path) + hash);
    } else {
      // Failsafe: just go home
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
